version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: event_manager_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: event_manager_redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: event_manager_backend
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis


  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: event_manager_celery
    command: celery -A config worker -l INFO
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres


  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: event_manager_celery_beat
    command: celery -A config beat -l INFO
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis


  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: event_manager_flower
    command: celery -A config flower --address=0.0.0.0
    env_file:
      - .env
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - celery


volumes:
  postgres_data:
  redis_data:
